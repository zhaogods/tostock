{% extends "layout/default.html" %}

{% block main_content %}
<link rel="stylesheet" href="/static/css/bootstrap-datepicker3.min.css" />
<script src="/static/js/bootstrap-datepicker.min.js"></script>
<script src="/static/js/bootstrap-datepicker.zh-CN.min.js"></script>
<style>
    .report-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #dfe7f0;
        border-radius: 12px;
        background: #f8fbff;
        margin-bottom: 12px;
    }

    .report-date-form {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin: 0;
    }

    .report-date-input {
        width: 150px;
        cursor: pointer;
        background: #fff !important;
    }

    .report-date-calendar {
        cursor: pointer;
    }

    .report-content {
        white-space: pre-wrap;
        word-break: break-word;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 16px;
        line-height: 1.6;
    }
</style>
<div class="page-content">
    <h3 class="header smaller lighter">{{ title }}</h3>
    <div class="report-toolbar">
        <form class="report-date-form" method="get" action="/instock/report/daily">
            <label for="dateid">日期：</label>
            <div class="input-group input-group-sm">
                <input type="text" value="{{ selected_date }}" id="dateid" name="date" class="form-control date-picker report-date-input" readonly>
                <span class="input-group-addon report-date-calendar"><i class="fa fa-calendar"></i></span>
            </div>
            <button type="submit" class="btn btn-sm btn-primary">查看</button>
        </form>
        <span class="text-muted">默认展示最新可用报告，可通过日历切换历史日期。</span>
    </div>
    {% if summary %}
    <div class="alert alert-info">
        <strong>摘要：</strong>{{ summary }}
    </div>
    {% end %}
    {% if created_at %}
    <p class="text-muted">生成时间：{{ created_at }}</p>
    {% end %}
    {% if error_message %}
    <div class="alert alert-warning">{{ error_message }}</div>
    {% end %}
    <pre class="report-content">{{ report_content }}</pre>
</div>

<script type="text/javascript">
    $(document).ready(function () {
        $('.date-picker').datepicker({
            language: 'zh-CN',
            format: 'yyyy-mm-dd',
            showOtherMonths: true,
            selectOtherMonths: false,
            autoclose: true,
            todayHighlight: true,
            todayBtn: 'linked'
        }).on('changeDate', function () {
            $(this).closest('form').submit();
        });
        $('.report-date-calendar').on('click', function () {
            $('#dateid').datepicker('show');
        });
    });
</script>
{% end %}
