{% extends "layout/default.html" %}

{% block main_content %}
<link rel="stylesheet" href="/static/css/bootstrap-datepicker3.min.css" />
<script src="/static/js/ag-grid-community.min.js"></script>
<script src="/static/js/sheetjs.xlsx.min.js"></script>
<script src="/static/js/bootstrap-datepicker.min.js"></script>
<script src="/static/js/bootstrap-datepicker.zh-CN.min.js"></script>
<style>
#instock-data {
    height: calc(100% - 91px);
}
.ag-cell-positive { color: #ff0000 !important; }
.ag-cell-negative { color: #00aa00 !important; }
.table-toolbar {
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f5f5f5;
    border-bottom: 1px solid #ddd;
    height: 35px;
}
.table-toolbar .date-picker {
    display: inline-block;
    width: 120px;
}
.status-bar {
    padding: 2px 8px;
    background: #f0f0f0;
    border-top: 1px solid #ddd;
    font-size: 12px;
    height: 20px;
    line-height: 16px;
}
</style>

<div style="height:100%;overflow:hidden;display:flex;flex-direction:column;">
    <div class="table-toolbar">
        <div>
            <span style="font-weight:bold;">{{ web_module_data.name }}</span>
            <span style="margin-left:16px;">日期：</span>
            <input type="text" value="{{ date_now }}" id="dateid"
                   class="input-group-sm form-control date-picker">
        </div>
        <div>
            <button id="resetFilter" class="btn btn-sm btn-primary">重置筛选</button>
            <button id="saveExcel" class="btn btn-sm btn-primary">保存 Excel</button>
        </div>
    </div>
    <div id="instock-data" class="ag-theme-quartz"></div>
    <div class="status-bar">
        <i class="fa fa-commenting-o"></i>
        总记录/筛选记录：<b id="totalRecords">0</b> / <b id="filteredRecords">0</b> 条
        - 当前位置：第 <b id="currentRow">0</b> 行
        <span id="loadMessage" style="margin-left:12px;color:#666;"></span>
    </div>
</div>

<script type="text/javascript">
    const nameParam = $.getUrlVar('table_name') || $.getUrlVar('name');
    let dateParam = "{{ date_now }}";
    const colInfos = {% raw column_names_json %};
    let gridApi;
    let totalRows = 0;

    function buildColumnDefs() {
        return colInfos.map(function (col) {
            var def = {
                field: col.value,
                headerName: col.caption,
                width: col.width || 100,
                sortable: true,
                filter: true,
                resizable: true,
            };

            if (['date', 'code', 'name'].indexOf(col.value) >= 0) {
                def.pinned = 'left';
            }

            if (col.value === 'code') {
                def.cellRenderer = function (params) {
                    if (!params.value) return '';
                    var date = (params.data && params.data.date) || dateParam;
                    var name = (params.data && params.data.name) || '';
                    return '<a href="/instock/data/indicators?code=' + params.value
                        + '&date=' + date + '&name=' + name
                        + '" target="_blank" style="color:#1a0dab;">' + params.value + '</a>';
                };
            }

            if (col.value === 'change_rate') {
                def.cellClassRules = {
                    'ag-cell-positive': function (params) { return params.value > 0; },
                    'ag-cell-negative': function (params) { return params.value < 0; },
                };
            }

            return def;
        });
    }

    function setLoadMessage(message, isError) {
        var el = document.getElementById('loadMessage');
        if (!el) return;
        el.textContent = message || '';
        el.style.color = isError ? '#d9534f' : '#666';
    }

    async function loadData(date) {
        setLoadMessage('正在加载数据...', false);
        try {
            var resp = await fetch('/instock/api_data?table_name=' + encodeURIComponent(nameParam) + '&date=' + encodeURIComponent(date));
            if (!resp.ok) {
                throw new Error('接口返回HTTP ' + resp.status);
            }
            var data = await resp.json();
            if (!Array.isArray(data)) {
                throw new Error('接口返回格式不是数组');
            }
            totalRows = data.length;
            gridApi.setGridOption('rowData', data);
            updateStatusBar();
            if (data.length === 0) {
                setLoadMessage('当前日期无数据，请切换日期', false);
                if (gridApi.showNoRowsOverlay) {
                    gridApi.showNoRowsOverlay();
                }
            } else {
                setLoadMessage('', false);
                if (gridApi.hideOverlay) {
                    gridApi.hideOverlay();
                }
            }
        } catch (e) {
            totalRows = 0;
            if (gridApi) {
                gridApi.setGridOption('rowData', []);
            }
            updateStatusBar();
            setLoadMessage('数据加载失败：' + e.message, true);
        }
    }

    function updateStatusBar() {
        if (!gridApi) return;
        var displayed = gridApi.getDisplayedRowCount();
        document.getElementById('totalRecords').textContent = totalRows;
        document.getElementById('filteredRecords').textContent = displayed;
    }

    function exportExcel() {
        var rowData = [];
        gridApi.forEachNodeAfterFilterAndSort(function (node) {
            rowData.push(node.data);
        });

        var headers = colInfos.map(function (c) { return c.caption; });
        var keys = colInfos.map(function (c) { return c.value; });
        var exportData = rowData.map(function (row) {
            var obj = {};
            keys.forEach(function (k, i) { obj[headers[i]] = row[k] != null ? row[k] : ''; });
            return obj;
        });

        var ws = XLSX.utils.json_to_sheet(exportData);
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, nameParam);
        XLSX.writeFile(wb, nameParam + dateParam + '.xlsx');
    }

    $(document).ready(function () {
        var gridOptions = {
            columnDefs: buildColumnDefs(),
            rowData: [],
            defaultColDef: {
                sortable: true,
                filter: true,
                resizable: true,
                floatingFilter: true,
            },
            suppressDragLeaveHidesColumns: true,
            onGridReady: function () {
                loadData(dateParam);
            },
            onSelectionChanged: function () {
                var selected = gridApi.getSelectedNodes();
                if (selected.length > 0) {
                    document.getElementById('currentRow').textContent = selected[0].rowIndex + 1;
                }
            },
            onFilterChanged: updateStatusBar,
            onSortChanged: updateStatusBar,
        };

        var gridDiv = document.querySelector('#instock-data');
        gridApi = agGrid.createGrid(gridDiv, gridOptions);

        $('.date-picker').datepicker({
            language: 'zh-CN',
            format: 'yyyy-mm-dd',
            autoclose: true,
            todayHighlight: true,
        }).on('changeDate', function () {
            dateParam = $('#dateid').val();
            loadData(dateParam);
        });

        document.getElementById('saveExcel').onclick = exportExcel;
        document.getElementById('resetFilter').onclick = function () {
            gridApi.setFilterModel(null);
        };
    });
</script>
{% end %}
