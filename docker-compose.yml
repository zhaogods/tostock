services:
  instock_config_init:
    image: busybox:latest
    container_name: InStockConfigInit
    command: sh -c "mkdir -p /config && touch /config/instockproxy.txt /config/eastmoneycookie.txt"
    volumes:
      - ./data:/config

  instockdbservice:
    image: library/mariadb:latest
    container_name: InStockDbService
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${db_database:-test}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - instock_network

  instock:
    image: zsswwz/tostock:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: InStock
    ports:
      - "${WEB_PORT:-9988}:${WEB_PORT:-9988}"
    env_file:
      - .env
    environment:
      - db_host=InStockDbService
      - Tornado_COOKIE_SECRET=${Tornado_COOKIE_SECRET}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_DAILY_RATE=${TUSHARE_DAILY_RATE:-400}
      - TUSHARE_DAILY_BASIC_RATE=${TUSHARE_DAILY_BASIC_RATE:-150}
      - TUSHARE_MONEYFLOW_RATE=${TUSHARE_MONEYFLOW_RATE:-150}
      - TUSHARE_STOCK_BASIC_RATE=${TUSHARE_STOCK_BASIC_RATE:-40}
      - TUSHARE_RATE_LIMIT=${TUSHARE_RATE_LIMIT:-180}
    volumes:
      - ./data/instockproxy.txt:/data/tostock/instock/config/proxy.txt
      - ./data/eastmoneycookie.txt:/data/tostock/instock/config/eastmoney_cookie.txt
      - ./docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      instock_config_init:
        condition: service_completed_successfully
      instockdbservice:
        condition: service_started
    networks:
      - instock_network

networks:
  instock_network:
    driver: bridge